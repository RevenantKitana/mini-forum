name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs of the same workflow/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: build + lint + unit/integration tests (requires PostgreSQL)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend – build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: miniforum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/miniforum_test
      DIRECT_URL: postgresql://testuser:testpass@localhost:5432/miniforum_test
      JWT_ACCESS_SECRET: ci_access_secret_must_be_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_at_least_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test
      PORT: 5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint (type-check)
        run: npm run lint
        working-directory: backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed database
        run: npm run db:seed
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: build + lint + unit tests (jsdom, no DB)
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend – build & test
    runs-on: ubuntu-latest

    env:
      VITE_API_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (type-check)
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Admin client: build + lint + unit tests (jsdom, no DB)
  # ─────────────────────────────────────────────────────────────────────────────
  test-admin:
    name: Admin Client – build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-client/package-lock.json

      - name: Install admin-client dependencies
        run: npm ci
        working-directory: admin-client

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: admin-client

      - name: Build
        run: npm run build
        working-directory: admin-client

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: admin-client

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin-client/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Vibe-content: build + lint + unit tests (no DB, no browser)
  # ─────────────────────────────────────────────────────────────────────────────
  test-vibe-content:
    name: Vibe Content – build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vibe-content/package-lock.json

      - name: Install vibe-content dependencies
        run: npm ci
        working-directory: vibe-content

      - name: Lint (type-check)
        run: npm run lint
        working-directory: vibe-content

      - name: Build
        run: npm run build
        working-directory: vibe-content

      - name: Run tests
        run: npm test
        working-directory: vibe-content

  # ─────────────────────────────────────────────────────────────────────────────
  # Playwright smoke tests (runs only on push to main to keep PR checks fast)
  # Requires: backend running + frontend built
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Run on push to main OR when the e2e label is applied to a PR
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: miniforum_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/miniforum_e2e
      DIRECT_URL: postgresql://testuser:testpass@localhost:5432/miniforum_e2e
      JWT_ACCESS_SECRET: ci_access_secret_must_be_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_at_least_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 5000
      VITE_API_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Set up backend database
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Start backend server (background)
        working-directory: backend
        run: node dist/index.js &

      - name: Wait for backend to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:5000/api/v1/health && break
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          VITE_API_URL: http://localhost:5000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Security: dependency vulnerability scanning (npm audit) for all packages
  # ─────────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend dependencies
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev
        working-directory: backend
        continue-on-error: false

      - name: Audit frontend dependencies
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev
        working-directory: frontend
        continue-on-error: false

      - name: Audit admin-client dependencies
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev
        working-directory: admin-client
        continue-on-error: false

      - name: Audit vibe-content dependencies
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev
        working-directory: vibe-content
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Security: secret scanning with Gitleaks
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for thorough scanning

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
