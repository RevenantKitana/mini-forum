openapi: "3.1.0"
info:
  title: Mini Forum API
  version: "1.0.0"
  description: |
    REST API for the Mini Forum platform. All endpoints are prefixed with `/api/v1`.

    **Base URLs:**
    - Development: `http://localhost:5000/api/v1`
    - Production: set via `VITE_API_URL` (frontend/admin-client) or `FORUM_API_URL` (vibe-content)

    **Authentication:** JWT Bearer token. Obtain via `POST /auth/login`, pass as `Authorization: Bearer <token>`.

    **Response format:** All responses follow a common envelope:
    ```json
    { "success": true, "message": "...", "data": { ... } }
    ```
    Paginated responses include:
    ```json
    { "success": true, "message": "...", "data": [...], "pagination": { "page": 1, "limit": 20, "total": 100, "totalPages": 5 } }
    ```
    Error responses:
    ```json
    { "success": false, "message": "...", "errors": { "field": ["error detail"] } }
    ```

    **Naming convention:** All response fields are `camelCase`. Request bodies accept both `camelCase` and `snake_case`.

servers:
  - url: http://localhost:5000/api/v1
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          description: Response payload (varies by endpoint)

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    UserSummary:
      type: object
      required: [id, username, displayName, role]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [MEMBER, MODERATOR, ADMIN, BOT]

    AuthTokens:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    Post:
      type: object
      required: [id, title, content, status, authorId, categoryId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED]
        isPinned:
          type: boolean
        isLocked:
          type: boolean
        viewCount:
          type: integer
        upvoteCount:
          type: integer
        downvoteCount:
          type: integer
        commentCount:
          type: integer
        authorId:
          type: integer
        categoryId:
          type: integer
        author:
          $ref: "#/components/schemas/UserSummary"
        tags:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              slug:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      required: [id, content, postId, authorId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        content:
          type: string
        postId:
          type: integer
        authorId:
          type: integer
        parentId:
          type: integer
          nullable: true
        upvoteCount:
          type: integer
        downvoteCount:
          type: integer
        author:
          $ref: "#/components/schemas/UserSummary"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          nullable: true

    Notification:
      type: object
      required: [id, type, userId, isRead, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          description: Notification type (e.g. NEW_COMMENT, NEW_VOTE, REPLY)
        userId:
          type: integer
        isRead:
          type: boolean
        isDeleted:
          type: boolean
        actorId:
          type: integer
          nullable: true
        actor:
          $ref: "#/components/schemas/UserSummary"
        postId:
          type: integer
          nullable: true
        commentId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

paths:
  # ==================== Health ====================
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time

  # ==================== Auth ====================
  /auth/login:
    post:
      summary: Login with email/username and password
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                  description: Email or username
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user, tokens]
                        properties:
                          user:
                            $ref: "#/components/schemas/UserSummary"
                          tokens:
                            $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password, displayName]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                password:
                  type: string
                  format: password
                  minLength: 8
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 50
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/UserSummary"
                          tokens:
                            $ref: "#/components/schemas/AuthTokens"
        "409":
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tokens:
                            $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Logout and invalidate refresh token
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: Logged out successfully

  /auth/me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/UserSummary"

  /auth/check-email:
    get:
      summary: Check if email is available
      operationId: checkEmail
      tags: [Auth]
      parameters:
        - in: query
          name: email
          schema:
            type: string
            format: email
          required: true
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          available:
                            type: boolean

  /auth/check-username:
    get:
      summary: Check if username is available
      operationId: checkUsername
      tags: [Auth]
      parameters:
        - in: query
          name: username
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          available:
                            type: boolean

  # ==================== Posts ====================
  /posts:
    get:
      summary: List posts (paginated)
      operationId: getPosts
      tags: [Posts]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category slug
        - in: query
          name: tag
          schema:
            type: string
          description: Filter by tag slug
        - in: query
          name: sort
          schema:
            type: string
            enum: [latest, popular, top]
            default: latest
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Post"
                      pagination:
                        $ref: "#/components/schemas/PaginationMeta"
    post:
      summary: Create a new post
      operationId: createPost
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, categoryId]
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 200
                content:
                  type: string
                  minLength: 10
                categoryId:
                  type: integer
                tags:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [DRAFT, PUBLISHED]
                  default: PUBLISHED
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Post"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /posts/{id}:
    get:
      summary: Get post by ID
      operationId: getPostById
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Post"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a post
      operationId: updatePost
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                categoryId:
                  type: integer
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Post"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a post
      operationId: deletePost
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== Comments ====================
  /posts/{postId}/comments:
    get:
      summary: Get comments for a post
      operationId: getCommentsByPost
      tags: [Comments]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated comments
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Comment"
                      pagination:
                        $ref: "#/components/schemas/PaginationMeta"

  /comments:
    post:
      summary: Create a comment
      operationId: createComment
      tags: [Comments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postId, content]
              properties:
                postId:
                  type: integer
                content:
                  type: string
                  minLength: 1
                parentId:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /comments/{id}:
    put:
      summary: Update a comment
      operationId: updateComment
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Comment"
        "403":
          description: Edit window expired or unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a comment
      operationId: deleteComment
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Comment deleted

  # ==================== Votes ====================
  /posts/{id}/vote:
    post:
      summary: Vote on a post (toggle)
      operationId: votePost
      tags: [Votes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [UPVOTE, DOWNVOTE]
      responses:
        "200":
          description: Vote recorded or removed (toggle)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          vote:
                            type: object
                            nullable: true
                            description: null if vote was removed (toggled off)
                          upvoteCount:
                            type: integer
                          downvoteCount:
                            type: integer

  /comments/{id}/vote:
    post:
      summary: Vote on a comment (toggle)
      operationId: voteComment
      tags: [Votes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [UPVOTE, DOWNVOTE]
      responses:
        "200":
          description: Vote recorded or removed (toggle)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          vote:
                            type: object
                            nullable: true
                          upvoteCount:
                            type: integer
                          downvoteCount:
                            type: integer

  # ==================== Notifications ====================
  /notifications:
    get:
      summary: Get user notifications
      operationId: getNotifications
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: unreadOnly
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Notification"
                      pagination:
                        $ref: "#/components/schemas/PaginationMeta"
    delete:
      summary: Delete all notifications
      operationId: deleteAllNotifications
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: All notifications deleted

  /notifications/unread-count:
    get:
      summary: Get unread notification count
      operationId: getUnreadCount
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer

  /notifications/read-all:
    patch:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer
                            description: Number of notifications marked as read

  /notifications/{id}/read:
    patch:
      summary: Mark a notification as read
      operationId: markNotificationRead
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Notification"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{id}:
    delete:
      summary: Delete a notification
      operationId: deleteNotification
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Notification deleted
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Health
    description: Service health check
  - name: Auth
    description: Authentication and registration
  - name: Posts
    description: Post CRUD and moderation
  - name: Comments
    description: Comment CRUD
  - name: Votes
    description: Upvote/downvote posts and comments
  - name: Notifications
    description: User notification management
