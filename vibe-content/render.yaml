services:
  - type: web
    name: vibe-content-service
    runtime: docker
    plan: standard
    
    # Build configuration
    dockerfilePath: Dockerfile
    
    # Port configuration  
    ports:
      - port: 4000
        protocol: http
    
    # Environment variables (configure in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CRON_SCHEDULE
        value: '*/30 * * * *'
      - key: BATCH_SIZE
        value: '1'
      - key: MAX_POSTS_PER_USER_DAY
        value: '3'
      - key: MAX_COMMENTS_PER_USER_DAY
        value: '6'
      - key: MAX_VOTES_PER_USER_DAY
        value: '15'
      - key: PROVIDER_TIMEOUT_MS
        value: '30000'
      # These MUST be configured as "secret files" or environment variables in Render:
      # - DATABASE_URL (from your production PostgreSQL)
      # - FORUM_API_URL (backend API endpoint)
      # - GEMINI_API_KEY (required)
      # - GROQ_API_KEY (optional, fallback)
      # - CEREBRAS_API_KEY (optional, fallback)
      # - BOT_PASSWORD (bot user password)
    
    # Health check
    healthCheckPath: /status
    healthCheckInterval: 30
    
    # Restart policy
    autoDeploy: true
    
    # Build settings
    buildCommand: npm run build
    startCommand: npm run start:prod
