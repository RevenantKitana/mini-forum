version: "3.9"

services:
  vibe-content:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-content-service
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      # Override with production values
      FORUM_API_URL: ${FORUM_API_URL:-https://mini-forum-backend.example.com/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/mini_forum?schema=public}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      BOT_PASSWORD: ${BOT_PASSWORD}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/30 * * * *}
      BATCH_SIZE: ${BATCH_SIZE:-1}
      MAX_POSTS_PER_USER_DAY: ${MAX_POSTS_PER_USER_DAY:-3}
      MAX_COMMENTS_PER_USER_DAY: ${MAX_COMMENTS_PER_USER_DAY:-6}
      MAX_VOTES_PER_USER_DAY: ${MAX_VOTES_PER_USER_DAY:-15}
      PROVIDER_TIMEOUT_MS: ${PROVIDER_TIMEOUT_MS:-30000}
      PORT: ${PORT:-4000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - vibe-content-logs:/app/logs
    networks:
      - mini-forum
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL database (shared with backend or separate)
  db:
    image: postgres:16-alpine
    container_name: vibe-content-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mini_forum}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - mini-forum
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vibe-content-logs:
  db-data:

networks:
  mini-forum:
    driver: bridge
