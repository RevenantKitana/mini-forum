version: "3.9"

services:
  vibe-content-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vibe-content-dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mini_forum?schema=public
      FORUM_API_URL: http://backend:3001/api
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      BOT_PASSWORD: BotUser@123
      CRON_SCHEDULE: */30 * * * *
      BATCH_SIZE: 1
      PROVIDER_TIMEOUT_MS: 30000
      PORT: 4000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - mini-forum
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: vibe-content-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_forum
    volumes:
      - db-dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mini-forum
    restart: unless-stopped

volumes:
  db-dev-data:

networks:
  mini-forum:
    driver: bridge
